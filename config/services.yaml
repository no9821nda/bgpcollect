# Конфигурация целевых сервисов: сервис -> источники IPv4-сетей.
#
# Поля сервиса:
#   asns:            курируемый seed-список ASN (основной источник истины).
#   as_sets:         IRR AS-SET для опционального расширения (только как подсказки, см. --expand-as-sets).
#   official:        официальные/публичные источники для сверки и дополнения.
#                    type: google_json | whois_asset | cidr_list
#   static_prefixes: статически заданные, публично известные диапазоны.
#
# ASN ниже — рабочий seed. Перед продакшеном сверить через PeeringDB org_id и bgp.he.net
# (см. `bgpcollect discover <service>`), список курируется руками.

settings:
  # Минимальная длина префикса IPv4, которую считаем разумной (отсекаем подозрительно широкие).
  min_ipv4_prefixlen: 8
  # Параметр RIPEstat sourceapp — вежливая идентификация клиента.
  ripestat_sourceapp: bgpcollect
  # Guardrail: не публиковать, если число префиксов упало больше чем на эту долю против прошлого запуска.
  max_shrink_ratio: 0.5

services:
  google:
    description: Google LLC (поиск и сервисы Google; БЕЗ Google Cloud / GCP customer ranges)
    # AS396982 (GOOGLE-CLOUD-PLATFORM) намеренно убран из include.
    asns: [15169, 36040, 19527, 41264, 139070, 139190, 36492, 45566, 24424, 22577, 26910, 36384, 36385, 43515]
    as_sets: ["AS-GOOGLE"]
    official:
      # goog.json = ВСЕ диапазоны Google (сервисы + GCP). GCP вычитаем ниже в exclude.
      - { type: google_json, url: "https://www.gstatic.com/ipranges/goog.json" }
    exclude:
      # cloud.json = диапазоны Google Cloud (GCP). Google рекомендует: google-сервисы = goog.json − cloud.json.
      official:
        - { type: google_json, url: "https://www.gstatic.com/ipranges/cloud.json" }
      asns: [396982]   # на случай GCP-префиксов, анонсируемых не из cloud.json

  youtube:
    description: YouTube (обслуживается из Google-ASN)
    asns: [43515, 36040]

  meta:
    description: Meta Platforms (Facebook, Instagram, WhatsApp)
    asns: [32934, 54115, 63293, 149642, 149769]
    as_sets: ["AS-FACEBOOK"]
    official:
      - { type: whois_asset, server: "whois.radb.net", query: "!gAS32934" }

  telegram:
    description: Telegram Messenger
    asns: [62041, 62014, 44907, 59930, 211157]
    official:
      # Официальный список диапазонов Telegram (IPv4+IPv6; IPv6 отсеется в normalize).
      - { type: cidr_list, url: "https://core.telegram.org/resources/cidr.txt" }
    static_prefixes:
      # Дублируют официальный cidr.txt — служат явным fallback'ом, если HTTP-загрузка упадёт.
      # Разбивка по /22 (как у Telegram), а не широкий /16, чтобы не маршрутизировать лишнее.
      - 91.105.192.0/23
      - 91.108.4.0/22
      - 91.108.8.0/22
      - 91.108.12.0/22
      - 91.108.16.0/22
      - 91.108.20.0/22
      - 91.108.56.0/22
      - 149.154.160.0/20
      - 185.76.151.0/24
      - 95.161.64.0/20    # известный диапазон Telegram, в офиц. cidr.txt отсутствует — оставляем

  # --- AI-сервисы ---
  # Важно: у большинства LLM-провайдеров НЕТ собственных анонсируемых сетей — сервис крутится
  # на AWS/Azure/GCP, поэтому «своей сети» в смысле отдельного ASN не существует. Ниже добавлены
  # только те, у кого есть собственный ASN или официальный публичный список диапазонов.

  claude:
    description: Anthropic / Claude (api.anthropic.com, claude.ai; собственный AS399358)
    # AS400243 (ANTHROPIC-2) / AS401551 (ANTHROPIC-3) зарегистрированы, но трафик не несут — не добавляем.
    asns: [399358]
    static_prefixes:
      # Официальный диапазон Anthropic (вход 160.79.104.0/23 ⊂ исход 160.79.104.0/21).
      # https://platform.claude.com/docs/en/api/ip-addresses
      - 160.79.104.0/21

  openai:
    description: OpenAI / ChatGPT (официальные диапазоны ботов; сам API/чат живёт на Azure)
    official:
      # JSON по формату идентичен goog.json ("prefixes":[{"ipv4Prefix":...}]) — парсер google_json подходит.
      # Это egress-диапазоны ботов OpenAI (публично документированы); ingress API — на Azure, отдельного списка нет.
      - { type: google_json, url: "https://openai.com/gptbot.json" }
      - { type: google_json, url: "https://openai.com/searchbot.json" }
      - { type: google_json, url: "https://openai.com/chatgpt-user.json" }

  # Gemini не выделяем: своей сети нет, обслуживается из Google AS15169 и полностью
  # перекрывается сервисом `google` — отдельный сервис давал бы дубль в `all`.

  # Grok (xAI), DeepSeek, Qwen — собственных анонсируемых сетей НЕ имеют:
  #   - grok/xAI: публичного ASN/списка диапазонов нет;
  #   - deepseek: резолвится в общие China Telecom (AS4808) / China Unicom (AS4134) — анонсировать их нельзя;
  #   - qwen: общий Alibaba Cloud (AS45102, ~весь Alibaba) — анонсировать целиком нет смысла.
  # При необходимости можно собирать их best-effort резолвом доменов (нестабильно, несколько CDN-IP):
  #
  # grok:
  #   description: xAI Grok (best-effort через резолв доменов; своей сети нет)
  #   domains: [grok.com, api.x.ai, x.ai]
  # deepseek:
  #   description: DeepSeek (best-effort через резолв доменов; своей сети нет)
  #   domains: [deepseek.com, chat.deepseek.com, api.deepseek.com]
  # qwen:
  #   description: Alibaba Qwen (best-effort через резолв доменов; своей сети нет)
  #   domains: [chat.qwen.ai, qwen.ai, dashscope.aliyuncs.com]

  # Пример СВОЕГО сервиса со своими списками IP. Раскомментируйте и поправьте.
  # Любой сервис может комбинировать источники: asns / official / static_prefixes / lists / domains.
  #
  # custom:
  #   description: Мой список
  #   static_prefixes:               # инлайн (одиночный IP станет /32)
  #     - 203.0.113.0/24
  #     - 198.51.100.7
  #   official:                      # cidr_list — текстовый список CIDR по HTTP (по одному в строке)
  #     - { type: cidr_list, url: "https://example.com/ranges.txt" }
  #   lists:                         # файлы со списком CIDR/IP (путь относительно запуска; в Docker — /app)
  #     - lists/custom.txt
  #   domains:                       # резолв доменов в A-записи
  #     - example.com
