name: update-prefixes

on:
  schedule:
    - cron: "0 */12 * * *"   # каждые 12 часов
  workflow_dispatch: {}        # ручной запуск

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Collect prefixes
        run: python -m bgpcollect -v collect -s all -o dist

      - name: Commit updated lists
        run: |
          git config user.name  "bgpcollect-bot"
          git config user.email "bgpcollect-bot@users.noreply.github.com"
          git add dist
          if git diff --cached --quiet; then
            echo "Изменений нет."
          else
            git commit -m "chore: update prefix lists ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
