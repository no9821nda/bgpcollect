# Раздача собранных списков по HTTP (antifilter-style).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    charset utf-8;

    # Списки и конфиги показываем как текст прямо в браузере.
    default_type text/plain;
    types {
        application/json json;
        text/plain       txt conf rsc;
    }

    location / {
        autoindex on;                 # просмотр каталогов dist/<сервис>/
        autoindex_exact_size off;
        autoindex_localtime on;
        try_files $uri $uri/ =404;
    }

    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }
}
