# Подписчики BGP-фида. Добавляйте свои сессии здесь и перезапускайте/перечитывайте конфиг.
# Маршруты помечаются community через bgpcollect_export; для blackhole-маршрутов
# ОБЯЗАТЕЛЕН `next hop self`.
#
# Пример явного подписчика:
#
# protocol bgp subscriber1 {
#     local as 65000;                 # = FEED_ASN
#     neighbor 203.0.113.10 as 64512;
#     ipv4 {
#         import none;                 # ничего не принимаем от подписчика
#         export filter bgpcollect_export;
#         next hop self;
#     };
# }
#
# Принимать входящие сессии от ЛЮБЫХ подписчиков (route-server, как antifilter) можно через
# dynamic BGP вашей версии BIRD, например:
#
# protocol bgp subscribers {
#     local as 65000;
#     neighbor range 0.0.0.0/0 external;
#     dynamic name "sub_";
#     passive on;
#     ipv4 { import none; export filter bgpcollect_export; next hop self; };
# }
