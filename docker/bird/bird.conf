# bgpcollect — основной BIRD-конфиг фида (BIRD 2.x).
# Генерируемые на старте куски лежат в /run/bird (router id, routes, env-пир).
log stderr all;

include "/run/bird/local.conf";              # router id (готовит entrypoint)

protocol device { }

# Собранные сети + фильтр bgpcollect_export.
# Файл кладёт entrypoint из общего тома ./feed (или stub, если фид ещё пуст).
include "/run/bird/bgpcollect_routes.conf";

# Явные подписчики — редактируйте этот файл (bind-mount ./docker/bird/peers.conf).
include "/etc/bird/peers.conf";

# Опциональный одиночный пир из переменных окружения (PEER_IP/PEER_ASN).
include "/run/bird/peer.env.conf";
